  <!-- Container principale -->
  <div class="container mt-5 main-container">
    <div class="row">
      <!-- Colonna sinistra per i filtri -->
      <div class="col-12 col-md-3 left-column">
        <h5>Filtri</h5>
        <div class="input-group mb-3">
          <input type="text" class="form-control" placeholder="Cerca..." aria-label="Cerca"
            aria-describedby="button-search">
          <div class="input-group-append">
            <button class="btn btn-primary" type="button" id="button-search">Cerca</button>
          </div>
        </div>

        <!-- Aggiungi altri filtri qui -->
        <div class="mb-3">
          <label for="categorySelect" class="form-label">Categoria</label>
          <select class="form-select" id="categorySelect">
            <option value="">Seleziona Categoria</option>
            <option value="1">Categoria 1</option>
            <option value="2">Categoria 2</option>
            <option value="3">Categoria 3</option>
          </select>
        </div>
      </div>

      <!-- Colonna destra per la lista delle tabelle -->
      <div class="col-12 col-md-8 ml-auto right-column">
        <!-- Tabella di esempio -->
        <div class="table-responsive">
          <table class="table table-striped" id="tabellaPrincipale">
            <thead>
              <tr>
                <th scope="col">STATO</th>
                <th scope="col">SERIALE</th>
                <th scope="col">ARTICOLO</th>
                <th scope="col">NOTE</th>
                <th scope="col" class="text-center">MODIFICA</th>
              </tr>
            </thead>
            <tbody>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  <!-- POPUP -->

  <div class="modal fade" id="modalModificaSeriale" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Modifica seriale</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="hidden" id="editSeriale">

          <div class="mb-3">
            <label class="form-label">Locazione</label>
            <input type="text" id="editLocazione" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Articolo</label>
            <input type="text" id="editArticolo" class="form-control" disabled>
          </div>

          <div class="mb-3">
            <label class="form-label">Note</label>
            <textarea id="editNote" class="form-control"></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-dismiss="modal">Annulla</button>
          <button class="btn btn-primary" id="btnSalvaModifica">Salva</button>
        </div>

      </div>
    </div>
